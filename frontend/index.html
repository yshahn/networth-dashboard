<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Net Worth Dashboard</title>
<script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
<style>
  :root{
    --ink:#1B2A4A; --paper:#FAF8F4; --paper-2:#F1ECE1; --gold:#B8923D;
    --sage:#4A7A5C; --brick:#A23E3E; --border:#DCD5C5; --muted:#8A8470;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Segoe UI',system-ui,sans-serif;}
  .wrap{max-width:880px;margin:0 auto;padding:32px 20px;}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:28px;margin:4px 0 0;}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;}
  .header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:28px;border-bottom:2px solid var(--ink);padding-bottom:14px;}
  .hero{background:var(--ink);color:var(--paper);border-radius:4px;padding:28px 32px;margin-bottom:24px;position:relative;}
  .hero .label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;opacity:.65;margin-bottom:6px;}
  .hero .amount{font-family:Georgia,serif;font-size:44px;font-weight:700;line-height:1.1;}
  .hero .row{display:flex;gap:32px;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.18);}
  .hero .row div .l{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:1px;}
  .hero .row div .v{font-size:19px;font-weight:600;}
  button{cursor:pointer;font-family:inherit;}
  .btn-gold{background:var(--gold);color:var(--ink);border:none;border-radius:4px;padding:8px 14px;font-size:13px;font-weight:700;}
  .btn-outline{background:transparent;border:1px solid var(--ink);border-radius:4px;padding:6px 12px;font-size:12px;color:var(--ink);}
  .btn-dark{background:var(--ink);color:var(--paper);border:none;border-radius:4px;padding:10px;font-size:13px;font-weight:600;width:100%;}
  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .card{background:var(--paper-2);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px;}
  .list{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:20px;}
  .row-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-top:1px solid #ECE6D6;}
  .row-item:first-child{border-top:none;}
  .row-item:nth-child(even){background:#FAF8F4;}
  .row-item:nth-child(odd){background:#fff;}
  .row-item .name{font-size:13px;font-weight:600;}
  .row-item .cat{font-size:11px;color:var(--muted);}
  .row-item input{width:110px;text-align:right;padding:6px 8px;border-radius:4px;border:1px solid var(--border);font-size:13px;font-family:Georgia,serif;}
  input[type=text], input[type=number], input[type=email], input[type=password], select{
    padding:9px 10px;border-radius:4px;border:1px solid var(--border);font-size:13px;background:#fff;color:var(--ink);width:100%;
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .muted{color:var(--muted);font-size:12px;}
  .auth-box{max-width:360px;margin:80px auto;text-align:center;}
  .auth-box .card{text-align:left;}
  .link-del{background:none;border:none;color:#C7BFA8;padding:4px;}
  .topbar{display:flex;justify-content:flex-end;margin-bottom:8px;}
  [hidden]{display:none !important;}
</style>
</head>
<body>

<div id="auth-screen" class="auth-box">
  <div class="eyebrow">Personal Ledger</div>
  <h1>로그인</h1>
  <div class="card" style="margin-top:20px;">
    <div style="margin-bottom:10px;"><input type="email" id="email" placeholder="이메일" /></div>
    <div style="margin-bottom:14px;"><input type="password" id="password" placeholder="비밀번호 (6자 이상)" /></div>
    <button class="btn-dark" id="signin-btn">로그인</button>
    <div style="margin-top:8px;"><button class="btn-outline" style="width:100%;" id="signup-btn">계정 만들기</button></div>
    <div id="auth-error" class="muted" style="color:var(--brick);margin-top:10px;"></div>
  </div>
</div>

<div id="dashboard" class="wrap" hidden>
  <div class="topbar"><button class="btn-outline" id="logout-btn">로그아웃</button></div>
  <div class="header">
    <div>
      <div class="eyebrow">Personal Ledger</div>
      <h1>순자산 대시보드</h1>
    </div>
    <div class="muted" id="today-date"></div>
  </div>

  <div class="hero">
    <div class="label">순자산 (Net Worth)</div>
    <div class="amount" id="net-worth">$0</div>
    <div id="delta" class="muted"></div>
    <div class="row">
      <div><div class="l">총 자산</div><div class="v" style="color:#8FD9A8;" id="total-assets">$0</div></div>
      <div><div class="l">총 부채</div><div class="v" style="color:#E8A0A0;" id="total-liabilities">$0</div></div>
    </div>
    <button class="btn-gold" id="snapshot-btn" style="position:absolute;top:24px;right:24px;">오늘 스냅샷 저장</button>
  </div>

  <div class="card" id="trend-card" hidden>
    <div class="section-title"><span>순자산 추이</span></div>
    <div id="trend-chart"></div>
  </div>

  <div class="section-title">
    <span>연결된 계좌 (자동)</span>
    <button class="btn-outline" id="connect-btn">+ 은행/증권 계좌 연결</button>
  </div>
  <div id="plaid-accounts" class="list"></div>
  <div id="plaid-empty" class="muted" style="margin-bottom:20px;">아직 연결된 계좌가 없습니다. "계좌 연결" 버튼으로 Robinhood, 은행 등을 연결하세요.</div>

  <div class="section-title">
    <span>수동 입력 항목</span>
    <button class="btn-outline" id="add-manual-btn">+ 항목 추가</button>
  </div>
  <div class="card" id="manual-form" hidden>
    <div class="grid2" style="margin-bottom:10px;">
      <select id="m-type"><option value="asset">자산</option><option value="liability">부채</option></select>
      <select id="m-category"></select>
      <input type="text" id="m-name" placeholder="이름 (예: MassMutual IRA)" />
      <input type="number" id="m-balance" placeholder="잔액 ($)" />
      <input type="text" id="m-address" placeholder="주소 (부동산만 해당, 예: 123 Main St, Atlanta GA)" style="grid-column:1 / -1;" hidden />
    </div>
    <button class="btn-dark" id="m-save-btn">추가하기</button>
  </div>

  <div class="section-title" style="color:var(--sage);"><span>수동 자산</span></div>
  <div id="manual-assets" class="list"></div>
  <div id="manual-assets-empty" class="muted" style="margin-bottom:20px;">수동으로 추가한 자산이 없습니다.</div>

  <div class="section-title" style="color:var(--brick);"><span>수동 부채</span></div>
  <div id="manual-liabilities" class="list"></div>
  <div id="manual-liabilities-empty" class="muted" style="margin-bottom:20px;">수동으로 추가한 부채가 없습니다.</div>

  <div class="muted" style="text-align:center;margin-top:30px;line-height:1.6;">
    MassMutual IRA / 생명보험, 부동산 등은 자동 연동이 어려워 수동 입력으로 관리합니다.
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
import {
  getFunctions, httpsCallable
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-functions.js";

const firebaseConfig = {
  apiKey: "AIzaSyAc9Vv1F1ODTX7358XrSm9FSSfD73rKvn8",
  authDomain: "networth-yong-app-2026.firebaseapp.com",
  projectId: "networth-yong-app-2026",
  storageBucket: "networth-yong-app-2026.firebasestorage.app",
  messagingSenderId: "572612375699",
  appId: "1:572612375699:web:24fa7a0673e2e261288966"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const functions = getFunctions(app, "us-central1");

const ASSET_CATEGORIES = [
  { id: "cash", label: "현금 / 은행" },
  { id: "robinhood", label: "Robinhood (주식)" },
  { id: "coinbase", label: "Coinbase (암호화폐)" },
  { id: "ira", label: "MassMutual IRA" },
  { id: "life_insurance", label: "MassMutual 생명보험" },
  { id: "real_estate", label: "부동산" },
  { id: "other_asset", label: "기타 자산" },
];
const LIABILITY_CATEGORIES = [
  { id: "credit_card", label: "신용카드" },
  { id: "loan", label: "대출" },
  { id: "mortgage", label: "모기지" },
  { id: "other_liability", label: "기타 부채" },
];
const catLabel = (id) => [...ASSET_CATEGORIES, ...LIABILITY_CATEGORIES].find(c => c.id === id)?.label || id;
const fmt = (n) => (n < 0 ? "-" : "") + "$" + Math.abs(Math.round(n)).toLocaleString("en-US");
const todayStr = () => new Date().toISOString().slice(0, 10);

let currentUser = null;
let plaidAccounts = [];
let manualAccounts = [];

// ---------- AUTH ----------
document.getElementById("signin-btn").onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) { authError.textContent = e.message; }
};
document.getElementById("signup-btn").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) { authError.textContent = e.message; }
};
document.getElementById("logout-btn").onclick = () => signOut(auth);

const authError = document.getElementById("auth-error");

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").hidden = true;
    document.getElementById("dashboard").hidden = false;
    document.getElementById("today-date").textContent = todayStr();
    await loadManualAccounts();
    await refreshPlaidAccounts();
    await loadSnapshots();
    render();
  } else {
    currentUser = null;
    document.getElementById("auth-screen").hidden = false;
    document.getElementById("dashboard").hidden = true;
  }
});

// ---------- MANUAL ACCOUNTS (Firestore) ----------
const mType = document.getElementById("m-type");
const mCategory = document.getElementById("m-category");
const mAddress = document.getElementById("m-address");
function populateCategorySelect() {
  const cats = mType.value === "asset" ? ASSET_CATEGORIES : LIABILITY_CATEGORIES;
  mCategory.innerHTML = cats.map(c => `<option value="${c.id}">${c.label}</option>`).join("");
  toggleAddressField();
}
function toggleAddressField() {
  mAddress.hidden = mCategory.value !== "real_estate";
}
mType.onchange = populateCategorySelect;
mCategory.onchange = toggleAddressField;
populateCategorySelect();

document.getElementById("add-manual-btn").onclick = () => {
  const f = document.getElementById("manual-form");
  f.hidden = !f.hidden;
};

document.getElementById("m-save-btn").onclick = async () => {
  const name = document.getElementById("m-name").value.trim();
  const balance = parseFloat(document.getElementById("m-balance").value) || 0;
  const address = mCategory.value === "real_estate" ? document.getElementById("m-address").value.trim() : "";
  if (!name) return;
  const payload = { type: mType.value, category: mCategory.value, name, balance };
  if (address) payload.address = address;
  const ref = await addDoc(collection(db, "users", currentUser.uid, "accounts"), payload);
  manualAccounts.push({ id: ref.id, ...payload });
  document.getElementById("m-name").value = "";
  document.getElementById("m-balance").value = "";
  document.getElementById("m-address").value = "";
  document.getElementById("manual-form").hidden = true;
  render();
};

async function loadManualAccounts() {
  const snap = await getDocs(collection(db, "users", currentUser.uid, "accounts"));
  manualAccounts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
}

async function updateManualBalance(id, value) {
  const num = parseFloat(value) || 0;
  const acc = manualAccounts.find(a => a.id === id);
  acc.balance = num;
  await setDoc(doc(db, "users", currentUser.uid, "accounts", id), acc);
  render();
}

async function deleteManualAccount(id) {
  await deleteDoc(doc(db, "users", currentUser.uid, "accounts", id));
  manualAccounts = manualAccounts.filter(a => a.id !== id);
  render();
}

// ---------- PLAID ----------
document.getElementById("connect-btn").onclick = async () => {
  try {
    const createLinkToken = httpsCallable(functions, "createLinkToken");
    const res = await createLinkToken();
    const linkToken = res.data.linkToken;

    const handler = Plaid.create({
      token: linkToken,
      onSuccess: async (publicToken, metadata) => {
        const exchangePublicToken = httpsCallable(functions, "exchangePublicToken");
        await exchangePublicToken({
          publicToken,
          institutionName: metadata.institution?.name || "Unknown",
        });
        await refreshPlaidAccounts();
        render();
      },
      onExit: (err) => { if (err) console.error("Plaid exit", err); },
    });
    handler.open();
  } catch (e) {
    alert("계좌 연결 시작 실패: " + e.message);
  }
};

async function refreshPlaidAccounts() {
  try {
    const getBalances = httpsCallable(functions, "getBalances");
    const res = await getBalances();
    plaidAccounts = res.data.accounts || [];
  } catch (e) {
    console.error("getBalances failed", e);
    plaidAccounts = [];
  }
}

// ---------- SNAPSHOT ----------
document.getElementById("snapshot-btn").onclick = async () => {
  const totals = computeTotals();
  await setDoc(doc(db, "users", currentUser.uid, "snapshots", todayStr()), {
    date: todayStr(),
    totalAssets: totals.totalAssets,
    totalLiabilities: totals.totalLiabilities,
    netWorth: totals.netWorth,
  });
  await loadSnapshots();
  render();
  alert("오늘 스냅샷 저장 완료");
};

// ---------- TREND CHART ----------
let snapshots = [];

async function loadSnapshots() {
  const snap = await getDocs(collection(db, "users", currentUser.uid, "snapshots"));
  snapshots = snap.docs.map(d => d.data()).sort((a, b) => a.date.localeCompare(b.date));
}

function renderTrendChart() {
  const card = document.getElementById("trend-card");
  const wrap = document.getElementById("trend-chart");
  if (snapshots.length < 2) {
    card.hidden = true;
    return;
  }
  card.hidden = false;

  const W = 800, H = 200, PAD = 30;
  const values = snapshots.map(s => s.netWorth);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;

  const points = snapshots.map((s, i) => {
    const x = PAD + (i / (snapshots.length - 1)) * (W - PAD * 2);
    const y = H - PAD - ((s.netWorth - min) / range) * (H - PAD * 2);
    return { x, y, ...s };
  });

  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p.x.toFixed(1) + "," + p.y.toFixed(1)).join(" ");
  const areaD = pathD + ` L${points[points.length - 1].x.toFixed(1)},${H - PAD} L${points[0].x.toFixed(1)},${H - PAD} Z`;

  const labelStep = Math.ceil(snapshots.length / 6);
  const labels = points
    .filter((_, i) => i % labelStep === 0 || i === points.length - 1)
    .map(p => `<text x="${p.x.toFixed(1)}" y="${H - 8}" font-size="10" fill="#8A8470" text-anchor="middle">${p.date.slice(5)}</text>`)
    .join("");

  const dots = points
    .map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#B8923D"><title>${p.date}: ${fmt(p.netWorth)}</title></circle>`)
    .join("");

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:200px;">
      <path d="${areaD}" fill="#B8923D" opacity="0.08" />
      <path d="${pathD}" fill="none" stroke="#B8923D" stroke-width="2" />
      ${dots}
      ${labels}
    </svg>
  `;
}


// ---------- RENDER ----------
function computeTotals() {
  let totalAssets = 0, totalLiabilities = 0;
  plaidAccounts.forEach(a => {
    if (a.type === "credit" || a.type === "loan") totalLiabilities += a.balance || 0;
    else totalAssets += a.balance || 0;
  });
  manualAccounts.forEach(a => {
    if (a.type === "liability") totalLiabilities += a.balance || 0;
    else totalAssets += a.balance || 0;
  });
  return { totalAssets, totalLiabilities, netWorth: totalAssets - totalLiabilities };
}

function render() {
  const t = computeTotals();
  document.getElementById("net-worth").textContent = fmt(t.netWorth);
  document.getElementById("total-assets").textContent = fmt(t.totalAssets);
  document.getElementById("total-liabilities").textContent = fmt(t.totalLiabilities);

  const plaidWrap = document.getElementById("plaid-accounts");
  const plaidEmpty = document.getElementById("plaid-empty");
  plaidEmpty.hidden = plaidAccounts.length > 0;
  plaidWrap.innerHTML = plaidAccounts.map(a => `
    <div class="row-item">
      <div style="flex:1;">
        <div class="name">${a.name}</div>
        <div class="cat">${a.institutionName} · ${a.subtype || a.type}</div>
      </div>
      <div style="font-family:Georgia,serif;">${fmt(a.balance || 0)}</div>
    </div>
  `).join("");

  const assetsWrap = document.getElementById("manual-assets");
  const liabWrap = document.getElementById("manual-liabilities");
  const renderGroup = (items) => items.map(a => `
    <div class="row-item">
      <div style="flex:1;">
        <div class="name">${a.name}</div>
        <div class="cat">${catLabel(a.category)}</div>
      </div>
      ${a.category === "real_estate" ? `<button class="btn-outline" onclick="window.__refreshZestimate('${a.id}')">시세 새로고침</button>` : ""}
      <input type="number" value="${a.balance}" onchange="window.__updateManual('${a.id}', this.value)" />
      <button class="link-del" onclick="window.__deleteManual('${a.id}')">✕</button>
    </div>
  `).join("");
  assetsWrap.innerHTML = renderGroup(manualAccounts.filter(a => a.type === "asset"));
  liabWrap.innerHTML = renderGroup(manualAccounts.filter(a => a.type === "liability"));
  document.getElementById("manual-assets-empty").hidden = manualAccounts.some(a => a.type === "asset");
  document.getElementById("manual-liabilities-empty").hidden = manualAccounts.some(a => a.type === "liability");

  renderTrendChart();
}

window.__updateManual = updateManualBalance;
window.__deleteManual = deleteManualAccount;
window.__refreshZestimate = async (id) => {
  const acc = manualAccounts.find(a => a.id === id);
  if (!acc) return;
  if (!acc.address) {
    alert("이 항목엔 저장된 주소가 없습니다. 항목을 지우고 주소를 입력해서 다시 추가해주세요.");
    return;
  }
  try {
    const getPropertyValue = httpsCallable(functions, "getPropertyValue");
    const res = await getPropertyValue({ address: acc.address });
    const newBalance = res.data.zestimate;
    const matchedAddress = res.data.address;
    await updateManualBalance(id, String(newBalance));
    alert(`시세 업데이트: ${fmt(newBalance)}\n\n매칭된 주소: ${matchedAddress}\n\n⚠️ 본인 집 주소와 일치하는지 꼭 확인하세요.`);
  } catch (e) {
    alert("시세 조회 실패: " + e.message);
  }
};
</script>
</body>
</html>
